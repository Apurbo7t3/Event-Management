<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - Event Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen m-0 bg-blue-500 flex flex-col justify-center items-center p-6">

    <div class="p-8 bg-white rounded-lg shadow-lg w-full max-w-lg text-center">
        <h2 class="text-2xl font-bold text-blue-600 mb-4">Check Your Email</h2>
        <p class="text-gray-700 mb-4">
            We've sent you an email with instructions to reset your password.
        </p>
        <p class="text-gray-500 text-sm mb-6">
            If you don't receive the email within a few minutes, please check your spam folder.
        </p>
        <a href="{% url 'login-page' %}"
            class="inline-block w-full bg-blue-500 hover:bg-blue-600 text-white font-medium p-3 rounded-lg transition text-center">
            Back to Login
        </a>
    </div>

</body>

</html>
